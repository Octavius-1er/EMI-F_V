<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMI QUEST - Gemini Edition</title>
  <style>
    /* Style simplifié pour l'exemple, garde ton CSS actuel ici */
    body { font-family: sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; padding: 20px; }
    #app { max-width: 500px; width: 100%; text-align: center; }
    .card { background: #16213e; border-radius: 15px; padding: 20px; margin: 20px 0; border: 2px solid #0f3460; }
    .btn-ans { padding: 15px 30px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin: 10px; }
    .vrai { background: #4ade80; } .faux { background: #f87171; }
    .loading { font-style: italic; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="app">
    <h1>EMI QUEST</h1>
    <div id="game-container">
      <p>Chargement du module de vérification...</p>
    </div>
  </div>

<script>
let questions = [];
let currentIndex = 0;
let score = 0;

async function initGame() {
  const container = document.getElementById('game-container');
  container.innerHTML = '<p class="loading">🤖 Gemini génère des pièges (Auteur : Titouen Lia)...</p>';

  try {
    const res = await fetch('/api/generate-infos');
    const data = await res.json();
    
    if (data.infos) {
      questions = data.infos;
      showQuestion();
    } else {
      throw new Error("Erreur de données");
    }
  } catch (e) {
    container.innerHTML = `<p style="color:red">Erreur : Vérifie ta clé GEMINI_API_KEY sur Vercel.</p>`;
  }
}

function showQuestion() {
  const container = document.getElementById('game-container');
  const q = questions[currentIndex];

  container.innerHTML = `
    <div class="card">
      <h3>Question ${currentIndex + 1} / 5</h3>
      <p><strong>QUOI :</strong> ${q.what}</p>
      <p><strong>AUTEUR :</strong> ${q.who}</p>
      <p><strong>OÙ :</strong> ${q.where}</p>
      <p><em>Source : ${q.source}</em></p>
    </div>
    <button class="btn-ans vrai" onclick="check(true)">VRAI</button>
    <button class="btn-ans faux" onclick="check(false)">FAUX</button>
  `;
}

function check(answer) {
  const q = questions[currentIndex];
  const correct = (answer === q.isTrue);
  if (correct) score++;

  alert(correct ? "✅ Bien joué !" : `❌ Piégé ! \n${q.truth}`);

  currentIndex++;
  if (currentIndex < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('game-container').innerHTML = `
    <h2>Terminé !</h2>
    <p style="font-size: 2rem;">Score : ${score} / 5</p>
    <button onclick="location.reload()" class="btn-ans">Rejouer</button>
  `;
}

initGame();
</script>
</body>
</html>
